<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CO.ME.S India – Stone Polishing Solutions</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
:root {
  --red:    #9B1C1C;
  --red2:   #C0392B;
  --red3:   #7A1515;
  --black:  #1A1A1A;
  --gray1:  #F8F8F8;
  --gray2:  #F0EFEF;
  --gray3:  #E0DEDE;
  --muted:  #666;
  --white:  #FFFFFF;
  --border: #E2E0E0;
  --font-display: "Bebas Neue", sans-serif;
  --font-body:    "Rajdhani", sans-serif;
  --font-mono:    "Space Mono", monospace;
  --nav-h: 70px;
  --shadow: 0 2px 20px rgba(0,0,0,.08);
  --shadow-md: 0 4px 32px rgba(0,0,0,.12);
}
*, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
html { scroll-behavior: smooth; }
body { background: var(--white); color: var(--black); font-family: var(--font-body); overflow-x: hidden; -webkit-font-smoothing: antialiased; }
a { text-decoration: none; color: inherit; }
img { display: block; max-width: 100%; }
::selection { background: var(--red); color: #fff; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--red); border-radius: 2px; }

/* ── BUTTONS ─────────────────────────────────────────────── */
.btn-red {
  background: var(--red);
  color: #fff;
  padding: .75rem 2rem;
  font-family: var(--font-body);
  font-weight: 700;
  font-size: .82rem;
  letter-spacing: .18em;
  text-transform: uppercase;
  border: none;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: .5rem;
  transition: background .2s, transform .15s, box-shadow .2s;
}
.btn-red:hover { background: var(--red2); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(155,28,28,.3); }

.btn-outline {
  background: transparent;
  color: var(--red);
  padding: .75rem 2rem;
  font-family: var(--font-body);
  font-weight: 700;
  font-size: .82rem;
  letter-spacing: .18em;
  text-transform: uppercase;
  border: 2px solid var(--red);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: .5rem;
  transition: background .2s, color .2s, transform .15s;
}
.btn-outline:hover { background: var(--red); color: #fff; transform: translateY(-2px); }

.btn-wa {
  background: #25D366;
  color: #fff;
  padding: .75rem 1.8rem;
  font-family: var(--font-body);
  font-weight: 700;
  font-size: .82rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  border: none;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: .6rem;
  transition: background .2s, transform .15s, box-shadow .2s;
}
.btn-wa:hover { background: #1EBE5C; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(37,211,102,.35); }

/* ── TYPOGRAPHY ──────────────────────────────────────────── */
.label-tag {
  font-family: var(--font-mono);
  font-size: .62rem;
  letter-spacing: .3em;
  color: var(--red);
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: .8rem;
  margin-bottom: .8rem;
}
.label-tag::before { content: ''; width: 28px; height: 2px; background: var(--red); display: inline-block; flex-shrink: 0; }

.section-title {
  font-family: var(--font-display);
  font-size: clamp(2.4rem, 4.5vw, 4rem);
  line-height: .95;
  letter-spacing: .02em;
  color: var(--black);
  margin-bottom: 1.2rem;
}
.section-title span { color: var(--red); }

/* ── LAYOUT ──────────────────────────────────────────────── */
.container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }
.section-pad { padding: 6rem 0; }

/* ── NAV ─────────────────────────────────────────────────── */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: var(--white);
  border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow);
  height: var(--nav-h);
  display: flex; align-items: center;
}
.nav-inner {
  display: flex; align-items: center;
  justify-content: space-between;
  width: 100%; padding: 0 2rem;
}
.nav-links { display: flex; gap: 2rem; list-style: none; }
.nav-link {
  font-family: var(--font-body); font-weight: 600;
  font-size: .85rem; letter-spacing: .12em; text-transform: uppercase;
  color: var(--muted); background: none; border: none; cursor: pointer;
  padding: .3rem 0; position: relative; transition: color .2s;
}
.nav-link::after { content:''; position:absolute; bottom:-2px; left:0; width:0; height:2px; background:var(--red); transition:width .2s; }
.nav-link:hover, .nav-link.active { color: var(--black); }
.nav-link:hover::after, .nav-link.active::after { width: 100%; }
.nav-right { display: flex; align-items: center; gap: 1rem; }
.hamburger { display: none; background: none; border: none; cursor: pointer; padding: .3rem; }

/* ── LANG SWITCHER ───────────────────────────────────────── */
.lang-btn {
  background: var(--gray1); border: 1px solid var(--border);
  color: var(--black); font-family: var(--font-mono); font-size: .65rem;
  letter-spacing: .1em; padding: .4rem .8rem; cursor: pointer;
  display: flex; align-items: center; gap: .5rem;
  border-radius: 4px; transition: border-color .2s, background .2s;
}
.lang-btn:hover { border-color: var(--red); background: #fff8f8; }
.lang-menu {
  position: absolute; top: calc(100% + 6px); right: 0;
  background: var(--white); border: 1px solid var(--border);
  border-radius: 6px; min-width: 160px; z-index: 200;
  box-shadow: var(--shadow-md); overflow: hidden;
}
.lang-item {
  display: flex; justify-content: space-between; align-items: center;
  width: 100%; background: transparent; border: none;
  border-bottom: 1px solid var(--border); color: var(--black);
  font-family: var(--font-body); font-size: .9rem; font-weight: 600;
  padding: .7rem 1rem; cursor: pointer; transition: background .15s;
}
.lang-item:last-child { border-bottom: none; }
.lang-item:hover { background: #fff5f5; }
.lang-item.selected { background: #fff0f0; color: var(--red); }

/* ── HERO ────────────────────────────────────────────────── */
.hero {
  min-height: 100vh;
  display: grid; grid-template-columns: 1fr 1fr;
  background: var(--white);
  position: relative; overflow: hidden;
}
.hero-left {
  display: flex; flex-direction: column; justify-content: center;
  padding: 8rem 3rem 5rem 4rem;
}
.hero-eyebrow {
  font-family: var(--font-mono); font-size: .65rem; letter-spacing: .3em;
  color: var(--red); text-transform: uppercase; margin-bottom: 1.5rem;
  display: flex; align-items: center; gap: .8rem;
}
.hero-eyebrow::before { content:''; width:32px; height:2px; background:var(--red); display:inline-block; flex-shrink:0; }
.hero-h1 {
  font-family: var(--font-display);
  font-size: clamp(4rem, 8vw, 7rem);
  line-height: .9; letter-spacing: .02em;
  color: var(--black); margin-bottom: 1.5rem;
}
.hero-h1 span { color: var(--red); }
.hero-sub { font-size: 1rem; line-height: 1.75; color: var(--muted); max-width: 420px; margin-bottom: 2.5rem; }
.hero-btns { display: flex; gap: 1rem; flex-wrap: wrap; }
.hero-stats {
  display: flex; gap: 2.5rem; margin-top: 3.5rem;
  padding-top: 2.5rem; border-top: 1px solid var(--border);
  flex-wrap: wrap;
}
.stat-n { font-family: var(--font-display); font-size: 2.6rem; color: var(--red); line-height: 1; }
.stat-l { font-family: var(--font-mono); font-size: .6rem; letter-spacing: .2em; color: var(--muted); text-transform: uppercase; margin-top: .3rem; }
.hero-right {
  position: relative; background: var(--gray1);
  overflow: hidden;
}
.hero-right img { width: 100%; height: 100%; object-fit: cover; }
.hero-right::after {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 80px;
  background: linear-gradient(to right, var(--white), transparent);
}
.hero-badge {
  position: absolute; bottom: 2rem; left: -1rem;
  background: var(--red); color: #fff;
  padding: 1.2rem 1.8rem; z-index: 2;
  box-shadow: var(--shadow-md);
}
.hero-badge-n { font-family: var(--font-display); font-size: 2.4rem; line-height: 1; }
.hero-badge-t { font-family: var(--font-mono); font-size: .55rem; letter-spacing: .12em; margin-top: .3rem; opacity: .85; }

/* ── TICKER ──────────────────────────────────────────────── */
.ticker-bar {
  background: var(--red); color: #fff;
  padding: .6rem 0; overflow: hidden;
  font-family: var(--font-mono); font-size: .65rem; letter-spacing: .25em; text-transform: uppercase;
}
.ticker-track { display: inline-flex; gap: 4rem; white-space: nowrap; animation: ticker 30s linear infinite; }
@keyframes ticker { from{transform:translateX(0)} to{transform:translateX(-50%)} }

/* ── ABOUT ───────────────────────────────────────────────── */
.about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: center; }
.about-img-wrap { position: relative; }
.about-img-wrap img { width: 100%; aspect-ratio: 4/5; object-fit: cover; border-radius: 2px; }
.about-badge {
  position: absolute; bottom: -1.5rem; right: -1.5rem;
  background: var(--red); color: #fff;
  width: 120px; height: 120px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
  box-shadow: var(--shadow-md);
}
.about-badge-n { font-family: var(--font-display); font-size: 2.4rem; line-height: 1; }
.about-badge-t { font-family: var(--font-mono); font-size: .52rem; letter-spacing: .1em; margin-top: .25rem; opacity: .85; }
.about-p { color: var(--muted); line-height: 1.8; font-size: 1rem; margin-bottom: 1.2rem; }
.feat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 2rem; }
.feat-card {
  border: 1px solid var(--border); padding: 1.3rem;
  border-radius: 4px; transition: border-color .2s, box-shadow .2s, transform .2s;
  background: var(--white);
}
.feat-card:hover { border-color: var(--red); box-shadow: 0 4px 16px rgba(155,28,28,.1); transform: translateY(-2px); }
.feat-card h4 { font-family: var(--font-body); font-weight: 700; font-size: .85rem; letter-spacing: .08em; text-transform: uppercase; color: var(--black); margin: .6rem 0 .4rem; }
.feat-card p { color: var(--muted); font-size: .83rem; line-height: 1.6; }

/* ── PRODUCTS ────────────────────────────────────────────── */
.products-bg { background: var(--gray1); }
.prod-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1.5rem; }
.prod-card {
  background: var(--white); border: 1px solid var(--border);
  border-radius: 6px; overflow: hidden;
  box-shadow: var(--shadow);
  transition: transform .25s, box-shadow .25s, border-color .25s;
  display: flex; flex-direction: column;
}
.prod-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-md); border-color: var(--red); }
.prod-img-wrap { background: var(--gray1); display: flex; align-items: center; justify-content: center; aspect-ratio: 1; padding: 2rem; cursor: pointer; overflow: hidden; }
.prod-img { width: 100%; height: 100%; object-fit: contain; transition: transform .4s; filter: drop-shadow(0 8px 24px rgba(0,0,0,.12)); }
.prod-card:hover .prod-img { transform: scale(1.06); }
.prod-info { padding: 1.5rem; flex: 1; display: flex; flex-direction: column; }
.prod-tag { font-family: var(--font-mono); font-size: .6rem; letter-spacing: .25em; color: var(--red); text-transform: uppercase; margin-bottom: .4rem; }
.prod-name { font-family: var(--font-display); font-size: 2rem; letter-spacing: .04em; color: var(--black); margin-bottom: .3rem; cursor: pointer; }
.prod-tagline { color: var(--muted); font-size: .85rem; line-height: 1.5; margin-bottom: 1.2rem; flex: 1; }
.prod-actions { display: grid; grid-template-columns: 1fr 1fr; gap: .6rem; }

/* ── SERVICES ────────────────────────────────────────────── */
.svc-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1.5rem; }
.svc-card {
  background: var(--white); border: 1px solid var(--border);
  border-radius: 6px; overflow: hidden;
  transition: transform .25s, box-shadow .25s, border-color .25s;
}
.svc-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); border-color: var(--red); }
.svc-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; transition: transform .4s; }
.svc-card:hover .svc-img { transform: scale(1.04); }
.svc-body { padding: 1.5rem; }
.svc-num { font-family: var(--font-display); font-size: 3rem; color: var(--border); line-height: 1; margin-bottom: .8rem; transition: color .2s; }
.svc-card:hover .svc-num { color: rgba(155,28,28,.2); }
.svc-card h3 { font-family: var(--font-body); font-weight: 700; font-size: .9rem; letter-spacing: .1em; text-transform: uppercase; color: var(--black); margin-bottom: .6rem; }
.svc-card p { color: var(--muted); font-size: .85rem; line-height: 1.7; }

/* ── PROCESS ─────────────────────────────────────────────── */
.process-bg { background: var(--gray1); }
.proc-grid { display: grid; grid-template-columns: repeat(5,1fr); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.proc-step { padding: 2rem 1.5rem; border-right: 1px solid var(--border); background: var(--white); transition: background .2s; }
.proc-step:last-child { border-right: none; }
.proc-step:hover { background: #fff5f5; }
.proc-n { font-family: var(--font-display); font-size: 3.5rem; color: var(--red); opacity: .25; line-height: 1; margin-bottom: .8rem; }
.proc-step h4 { font-family: var(--font-body); font-weight: 700; font-size: .8rem; letter-spacing: .08em; text-transform: uppercase; color: var(--black); margin-bottom: .7rem; line-height: 1.4; }
.proc-li { font-size: .78rem; color: var(--muted); padding-left: .9rem; position: relative; margin-bottom: .3rem; }
.proc-li::before { content: '—'; position: absolute; left: 0; color: var(--red); font-size: .7rem; }

/* ── FAQ ─────────────────────────────────────────────────── */
.faq-wrap { max-width: 800px; }
.faq-item { border-bottom: 1px solid var(--border); }
.faq-q {
  width: 100%; background: none; border: none; color: var(--black);
  font-family: var(--font-body); font-weight: 600; font-size: 1rem;
  text-align: left; padding: 1.5rem 0; cursor: pointer;
  display: flex; justify-content: space-between; align-items: center; gap: 1rem;
  transition: color .2s;
}
.faq-q:hover, .faq-q.open { color: var(--red); }
.faq-icon { font-size: 1.2rem; color: var(--red); transition: transform .3s; flex-shrink: 0; font-weight: 400; }
.faq-icon.open { transform: rotate(45deg); }
.faq-body { overflow: hidden; max-height: 0; transition: max-height .35s ease, padding .3s; color: var(--muted); font-size: .93rem; line-height: 1.8; }
.faq-body.open { max-height: 260px; padding-bottom: 1.5rem; }

/* ── CONTACT ─────────────────────────────────────────────── */
.contact-bg { background: var(--gray1); }
.contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; }
.cinfo-item { display: flex; gap: 1rem; padding: 1.2rem; background: var(--white); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 1rem; transition: border-color .2s, box-shadow .2s; }
.cinfo-item:hover { border-color: var(--red); box-shadow: 0 2px 12px rgba(155,28,28,.1); }
.cinfo-icon { font-size: 1.3rem; flex-shrink: 0; }
.cinfo-label { font-family: var(--font-mono); font-size: .6rem; letter-spacing: .22em; color: var(--red); text-transform: uppercase; margin-bottom: .3rem; }
.cinfo-val { color: var(--muted); font-size: .88rem; line-height: 1.6; }
.form-group { display: flex; flex-direction: column; gap: .4rem; margin-bottom: 1rem; }
.form-label { font-family: var(--font-mono); font-size: .6rem; letter-spacing: .22em; color: var(--red); text-transform: uppercase; }
.form-input {
  background: var(--white); border: 1px solid var(--border); color: var(--black);
  font-family: var(--font-body); font-size: .95rem; padding: .75rem 1rem;
  border-radius: 4px; outline: none; width: 100%; transition: border-color .2s, box-shadow .2s;
}
.form-input:focus { border-color: var(--red); box-shadow: 0 0 0 3px rgba(155,28,28,.08); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

/* ── PRODUCT DETAIL ──────────────────────────────────────── */
.breadcrumb { background: var(--gray1); border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; align-items: center; gap: .7rem; font-family: var(--font-mono); font-size: .62rem; letter-spacing: .18em; text-transform: uppercase; }
.bc-link { color: var(--muted); cursor: pointer; transition: color .2s; }
.bc-link:hover { color: var(--red); }
.bc-sep { color: var(--border); }
.bc-cur { color: var(--red); }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; padding: 4rem 0; align-items: start; }
.gallery-main { background: var(--gray1); border: 1px solid var(--border); border-radius: 6px; display: flex; align-items: center; justify-content: center; aspect-ratio: 1; overflow: hidden; margin-bottom: .8rem; }
.gallery-main img { width: 100%; height: 100%; object-fit: contain; padding: 2rem; filter: drop-shadow(0 8px 24px rgba(0,0,0,.15)); transition: opacity .3s; }
.thumb-row { display: flex; gap: .6rem; }
.thumb { flex: 1; aspect-ratio: 1; border: 2px solid var(--border); border-radius: 4px; overflow: hidden; cursor: pointer; transition: border-color .2s; background: var(--gray1); }
.thumb.active { border-color: var(--red); }
.thumb img { width: 100%; height: 100%; object-fit: contain; padding: .3rem; opacity: .6; transition: opacity .2s; }
.thumb.active img, .thumb:hover img { opacity: 1; }
.spec-table { width: 100%; border-collapse: collapse; }
.spec-row { border-bottom: 1px solid var(--border); }
.spec-l { padding: .85rem 0; font-weight: 600; font-size: .82rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; width: 45%; }
.spec-v { padding: .85rem 0; font-weight: 600; font-size: .9rem; color: var(--black); }
.app-item { display: flex; align-items: center; gap: 1rem; padding: .9rem 1rem; border: 1px solid var(--border); border-radius: 4px; margin-bottom: .7rem; background: var(--white); transition: border-color .2s, background .2s; }
.app-item:hover { border-color: var(--red); background: #fff8f8; }
.app-n { font-family: var(--font-display); font-size: 1.3rem; color: var(--red); opacity: .4; line-height: 1; flex-shrink: 0; }
.cta-box { background: var(--red); padding: 2.5rem 3rem; border-radius: 6px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1.5rem; margin: 3rem 0; }
.cta-box h3 { font-family: var(--font-display); font-size: 2rem; color: #fff; line-height: 1.1; margin-bottom: .4rem; }
.cta-box p { color: rgba(255,255,255,.8); font-size: .9rem; }

/* ── FOOTER ──────────────────────────────────────────────── */
.footer { background: var(--black); color: #fff; padding: 4rem 0 2rem; }
.footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 3rem; padding-bottom: 2.5rem; border-bottom: 1px solid #2a2a2a; }
.footer-desc { color: #888; font-size: .88rem; line-height: 1.7; max-width: 300px; margin-top: .8rem; margin-bottom: 1.5rem; }
.footer-h { font-family: var(--font-mono); font-size: .6rem; letter-spacing: .28em; color: var(--red); text-transform: uppercase; margin-bottom: 1rem; }
.footer-link { color: #888; font-size: .88rem; background: none; border: none; cursor: pointer; text-align: left; padding: .3rem 0; display: block; font-family: var(--font-body); transition: color .2s; width: 100%; }
.footer-link:hover { color: #fff; }
.footer-bottom { display: flex; justify-content: space-between; align-items: center; padding-top: 1.5rem; color: #555; font-family: var(--font-mono); font-size: .6rem; letter-spacing: .1em; flex-wrap: wrap; gap: .5rem; }

/* ── WA FLOAT ────────────────────────────────────────────── */
.wa-float {
  position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 99;
  background: #25D366; color: #fff; border: none; cursor: pointer;
  width: 56px; height: 56px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(37,211,102,.45);
  transition: transform .2s, box-shadow .2s;
}
.wa-float:hover { transform: scale(1.12); box-shadow: 0 6px 28px rgba(37,211,102,.6); }
.wa-float svg { width: 28px; height: 28px; }

/* ── RESPONSIVE ──────────────────────────────────────────── */
@media (max-width: 1024px) {
  .prod-grid { grid-template-columns: repeat(2,1fr); }
  .svc-grid { grid-template-columns: repeat(2,1fr); }
  .proc-grid { grid-template-columns: repeat(3,1fr); }
}
@media (max-width: 768px) {
  .nav-links { display: none; }
  .hamburger { display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; }
  .hero { grid-template-columns: 1fr; min-height: auto; }
  .hero-left { padding: 6rem 1.5rem 3rem; }
  .hero-right { display: none; }
  .about-grid, .contact-grid, .detail-grid { grid-template-columns: 1fr; gap: 2.5rem; }
  .about-badge { bottom: 1rem; right: 1rem; }
  .prod-grid { grid-template-columns: 1fr; }

const AppCtx = createContext(null);
function AppProvider({children}){
  const [lang,setLangS] = useState(()=>localStorage.getItem('comes_lang')||'en');
  const setLang = useCallback(l=>{setLangS(l);localStorage.setItem('comes_lang',l);},[]);
  const t = useCallback(k=>(T[lang]||T.en)[k]||(T.en[k]||k),[lang]);
  return <AppCtx.Provider value={{lang,setLang,t}}>{children}</AppCtx.Provider>;
}
function useApp(){return useContext(AppCtx);}

const RouterCtx = createContext(null);
function RouterProvider({children}){
  const [page,setPage] = useState({name:'home',params:{}});
  const nav = useCallback((name,params={})=>{setPage({name,params});window.scrollTo(0,0);},[]);
  return <RouterCtx.Provider value={{page,nav}}>{children}</RouterCtx.Provider>;
}
function useNav(){return useContext(RouterCtx);}

// ── LANG SWITCHER ─────────────────────────────────────────────
function LangSwitcher(){
  const {lang,setLang}=useApp();
  const [open,setOpen]=useState(false);
  const ref=useRef(null);
  const cur=LANGS.find(l=>l.c===lang);
  useEffect(()=>{
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener('mousedown',h);
    return()=>document.removeEventListener('mousedown',h);
  },[]);
  return (
    <div ref={ref} style={{position:'relative'}}>
      <button className="lang-btn" onClick={()=>setOpen(o=>!o)}>
        🌐 {cur.n} <span style={{opacity:.5,fontSize:'.55rem'}}>{open?'▲':'▼'}</span>
      </button>
      {open&&(
        <div className="lang-menu">
          {LANGS.map(opt=>(
            <button key={opt.c} className={`lang-item${lang===opt.c?' selected':''}`}
              onClick={()=>{setLang(opt.c);setOpen(false);}}>
              <span>{opt.n}</span>
              <span style={{fontFamily:'var(--font-mono)',fontSize:'.58rem',opacity:.4}}>{opt.c.toUpperCase()}</span>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

// ── NAVBAR ────────────────────────────────────────────────────
function Navbar(){
  const {t}=useApp();
  const {page,nav}=useNav();
  const [mob,setMob]=useState(false);
  const links=[
    {k:'nav.home',p:'home'},
    {k:'nav.about',p:'home',a:'about'},
    {k:'nav.products',p:'products'},
    {k:'nav.services',p:'home',a:'services'},
    {k:'nav.contact',p:'home',a:'contact'},
  ];
  const scrollTo=(a)=>{const el=document.getElementById(a);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});};
  const go=(p,a)=>{
    setMob(false);
    if(a){
      if(page.name==='home'){ scrollTo(a); }
      else{ nav(p); setTimeout(()=>scrollTo(a),120); }
    } else { nav(p); window.scrollTo(0,0); }
  };
  return (
    <>
      <nav className="nav">
        <div className="nav-inner">
          <img src={window.LOGO_URI} alt="COMES India" onClick={()=>nav('home')}
            style={{height:48,width:'auto',objectFit:'contain',cursor:'pointer'}} />
          <ul className="nav-links">
            {links.map(l=>(
              <li key={l.k}>
                <button className={`nav-link${page.name===l.p&&!l.a?' active':''}`} onClick={()=>go(l.p,l.a)}>{t(l.k)}</button>
              </li>
            ))}
          </ul>
          <div className="nav-right">
            <LangSwitcher/>
            <button className="btn-red" style={{padding:'.5rem 1.3rem',fontSize:'.75rem'}} onClick={()=>go('home','contact')}>{t('nav.cta')}</button>
            <button className="hamburger" onClick={()=>setMob(o=>!o)} aria-label="Menu">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--black)" strokeWidth="2">
                {mob?<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>:<><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></>}
              </svg>
            </button>
          </div>
        </div>
      </nav>
      {mob&&(
        <div style={{position:'fixed',top:'var(--nav-h)',left:0,right:0,background:'var(--white)',zIndex:99,borderBottom:'1px solid var(--border)',padding:'1.5rem',boxShadow:'var(--shadow-md)',display:'flex',flexDirection:'column',gap:'.8rem'}}>
          {links.map(l=>(
            <button key={l.k} className="nav-link" style={{textAlign:'left',fontSize:'.95rem',padding:'.5rem 0'}} onClick={()=>go(l.p,l.a)}>{t(l.k)}</button>
          ))}
          <div style={{paddingTop:'.5rem'}}><LangSwitcher/></div>
        </div>
      )}
    </>
  );
}

            <div style={{display:'flex',alignItems:'center',gap:'1rem',flexWrap:'wrap'}}>
              <button type="submit" className="btn-red">{t('ct.sub')}</button>
              {sent&&<span style={{fontFamily:'var(--font-mono)',fontSize:'.7rem',color:'#16a34a',letterSpacing:'.1em'}}>✓ {t('ct.ok')}</span>}
            </div>
          </form>
        </div>
      </div>
    </section>
  );
}

// ── HOME PAGE ─────────────────────────────────────────────────
function Home(){
  return (<><Hero/><About/><ProductsSection/><Services/><Faq/><Contact/></>);
}

// ── PRODUCTS PAGE ─────────────────────────────────────────────
function ProductsPage(){
  const {t}=useApp();
  return (
    <div style={{paddingTop:'var(--nav-h)',minHeight:'100vh',background:'var(--white)'}}>
      <div style={{background:'var(--gray1)',borderBottom:'1px solid var(--border)',padding:'3rem 0'}}>
        <div className="container">
          <div className="label-tag">{t('pr.lbl')}</div>
          <h1 className="section-title">{t('pr.t1')} <span>{t('pr.t2')}</span></h1>
          <p style={{color:'var(--muted)',maxWidth:520,fontSize:'1rem',lineHeight:1.7}}>Every head is 100% original COMES Italy — imported and serviced by our certified engineers across India.</p>
        </div>
      </div>
      <div className="container section-pad">
        <div className="prod-grid">
          {PRODUCTS.map(p=><ProdCard key={p.id} p={p}/>)}
        </div>
      </div>
    </div>
  );
}

// ── PRODUCT DETAIL ────────────────────────────────────────────
function ProductDetail({slug}){
  const {t}=useApp();
  const {nav}=useNav();
  const p=PRODUCTS.find(x=>x.slug===slug);
  const [img,setImg]=useState(0);
  if(!p) return <div style={{textAlign:'center',padding:'8rem 2rem'}}><h2 style={{fontFamily:'var(--font-display)',fontSize:'3rem',color:'var(--red)'}}>Product Not Found</h2><button className="btn-red" style={{marginTop:'1.5rem'}} onClick={()=>nav('products')}>Browse All</button></div>;
  const related=PRODUCTS.filter(x=>x.id!==p.id);
  return (
    <div style={{paddingTop:'var(--nav-h)',minHeight:'100vh',background:'var(--white)'}}>
      <div className="breadcrumb">
        <span className="bc-link" onClick={()=>nav('home')}>Home</span>
        <span className="bc-sep">›</span>
        <span className="bc-link" onClick={()=>nav('products')}>{t('nav.products')}</span>
        <span className="bc-sep">›</span>
        <span className="bc-cur">{p.name}</span>
      </div>
      <div className="container">
        <div className="detail-grid">
          <div>
            <div className="gallery-main">
              <img src={p.gallery[img]} alt={p.name}/>
            </div>
            <div className="thumb-row">
              {p.gallery.map((g,i)=>(
                <div key={i} className={`thumb${img===i?' active':''}`} onClick={()=>setImg(i)}>
                  <img src={g} alt=""/>
                </div>
              ))}
            </div>
          </div>
          <div>
            <div className="prod-tag" style={{marginBottom:'.6rem'}}>{t('pr.tag')}</div>
            <h1 style={{fontFamily:'var(--font-display)',fontSize:'clamp(3rem,5vw,5rem)',lineHeight:.92,letterSpacing:'.02em',marginBottom:'.6rem'}}>{p.name}</h1>
            <p style={{fontFamily:'var(--font-body)',fontWeight:600,fontSize:'.95rem',color:'var(--red)',letterSpacing:'.05em',marginBottom:'1.2rem'}}>{p.tagline}</p>
            <p style={{color:'var(--muted)',lineHeight:1.8,fontSize:'.97rem',marginBottom:'2rem'}}>{p.desc}</p>
            <div style={{background:'var(--gray1)',border:'1px solid var(--border)',borderRadius:'6px',padding:'1.5rem',marginBottom:'2rem'}}>
              <div style={{fontFamily:'var(--font-mono)',fontSize:'.6rem',letterSpacing:'.2em',color:'var(--muted)',textTransform:'uppercase',marginBottom:'.5rem'}}>Ready to enquire?</div>
              <p style={{color:'var(--black)',fontSize:'.9rem',lineHeight:1.5,marginBottom:'1rem'}}>Chat with our technical team on WhatsApp for pricing, availability, and requirements.</p>
              <button className="btn-wa" onClick={()=>openWA(p.waMsg)}><WAIcon size={18}/> {t('pr.now')}</button>
            </div>
            <div className="label-tag" style={{marginBottom:'.8rem'}}>{t('pr.feat')}</div>
            <ul style={{listStyle:'none',display:'flex',flexDirection:'column',gap:'.5rem',marginBottom:'1.5rem'}}>
              {p.feats.map(f=>(
                <li key={f} style={{display:'flex',alignItems:'flex-start',gap:'.7rem',color:'var(--muted)',fontSize:'.9rem',lineHeight:1.5}}>
                  <span style={{color:'var(--red)',flexShrink:0,marginTop:'.1rem',fontWeight:700}}>✓</span>{f}
                </li>
              ))}
            </ul>
          </div>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1.5rem',marginBottom:'3rem'}}>
          <div style={{background:'var(--gray1)',border:'1px solid var(--border)',borderRadius:'6px',padding:'2rem'}}>
            <div className="label-tag" style={{marginBottom:'1.2rem'}}>{t('pr.spec')}</div>
            <table className="spec-table">
              <tbody>
                {p.specs.map((s,i)=>(
                  <tr key={s.l} className="spec-row" style={{borderBottom:i<p.specs.length-1?'1px solid var(--border)':'none'}}>
                    <td className="spec-l">{s.l}</td>
                    <td className="spec-v">{s.v}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div style={{background:'var(--white)',border:'1px solid var(--border)',borderRadius:'6px',padding:'2rem'}}>
            <div className="label-tag" style={{marginBottom:'1.2rem'}}>{t('pr.app')}</div>
            {p.apps.map((a,i)=>(
              <div key={a} className="app-item">
                <span className="app-n">{String(i+1).padStart(2,'0')}</span>
                <span style={{color:'var(--black)',fontSize:'.9rem',fontWeight:600}}>{a}</span>
              </div>
            ))}
          </div>
        </div>

        <div className="cta-box">
          <div>
            <h3>Ready to upgrade your polishing line?</h3>
            <p>Talk to our engineers on WhatsApp — fast response, every time.</p>
          </div>
          <button className="btn-wa" style={{background:'#fff',color:'#25D366',fontWeight:700}} onClick={()=>openWA(p.waMsg)}><WAIcon size={18}/> {t('pr.now')}</button>
        </div>

        {related.length>0&&(
          <div style={{paddingBottom:'4rem'}}>
            <div className="label-tag">Other Heads</div>
            <h2 className="section-title" style={{marginBottom:'2rem'}}>You May Also <span>Consider</span></h2>
            <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:'1.5rem'}}>
              {related.map(rp=><ProdCard key={rp.id} p={rp}/>)}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────
function AppContent(){
  const {page}=useNav();
  let content;
  if(page.name==='home') content=<Home/>;
  else if(page.name==='products') content=<ProductsPage/>;
  else if(page.name==='product') content=<ProductDetail slug={page.params.slug}/>;
  else content=<div style={{textAlign:'center',padding:'8rem 2rem'}}><h2 style={{color:'var(--red)',fontFamily:'var(--font-display)',fontSize:'3rem'}}>404</h2></div>;
  return (
    <>
      <Navbar/>
      <main>{content}</main>
      <Footer/>
      <button className="wa-float" onClick={()=>openWA(WA_GEN)} title="Chat on WhatsApp">
        <WAIcon size={28}/>
      </button>
    </>
  );
}
function App(){
  return <AppProvider><RouterProvider><AppContent/></RouterProvider></AppProvider>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
